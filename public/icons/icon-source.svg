<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pantry Pal">
  <defs>
    <linearGradient id="pp-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d98a6e"/>
      <stop offset="1" stop-color="#b5634a"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (no rounding) so platform masks look clean -->
  <rect width="64" height="64" fill="url(#pp-bg)"/>
  <!-- leaf sprig -->
  <path d="M32 20c-1.6-4.2-5.4-6.8-9.6-6.6 1 4 3.8 7 7.8 8" fill="#c8d4ac"/>
  <path d="M32 20c1.6-4.6 5.6-7.4 10.2-7-1 4.4-4.2 7.6-8.6 8.4" fill="#9aad68"/>
  <!-- basket body -->
  <path d="M16 26h32l-3.4 18.6A6 6 0 0 1 38.7 50H25.3a6 6 0 0 1-5.9-5.4z" fill="#fdf6e3"/>
  <!-- basket rim -->
  <rect x="13.5" y="23" width="37" height="6" rx="3" fill="#fff8e7"/>
  <!-- weave lines -->
  <path d="M24 30l-1.5 16M32 30v16M40 30l1.5 16" stroke="#e6d8b5" stroke-width="2.2" stroke-linecap="round"/>
  <!-- produce peeking out -->
  <circle cx="27" cy="24.5" r="5" fill="#e0a98c"/>
  <circle cx="37" cy="24.5" r="5.5" fill="#7a9442"/>
  <circle cx="32" cy="23" r="4" fill="#ef9d3a"/>
</svg>
